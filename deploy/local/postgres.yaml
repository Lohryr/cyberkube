---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cyberkube-postgres
  namespace: cyberkube
  labels:
    app: cyberkube-postgres
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: cyberkube-postgres
  template:
    metadata:
      labels:
        app: cyberkube-postgres
    spec:
      containers:
      - name: postgres
        image: postgres:16-alpine
        imagePullPolicy: IfNotPresent
        ports:
        - name: postgres
          containerPort: 5432
        env:
        - name: POSTGRES_USER
          value: cyberkube
        - name: POSTGRES_DB
          value: cyberkube
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: cyberkube-secrets
              key: POSTGRES_PASSWORD
        # local: ephemeral storage is fine, migrations re-run idempotently.
        - name: PGDATA
          value: /var/lib/postgresql/data/pgdata
        volumeMounts:
        - name: data
          mountPath: /var/lib/postgresql/data
        readinessProbe:
          exec:
            command: ["pg_isready", "-U", "cyberkube", "-d", "cyberkube"]
          initialDelaySeconds: 5
          periodSeconds: 5
        resources:
          requests:
            cpu: 50m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
      volumes:
      - name: data
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: cyberkube-postgres
  namespace: cyberkube
  labels:
    app: cyberkube-postgres
spec:
  selector:
    app: cyberkube-postgres
  ports:
  - name: postgres
    port: 5432
    targetPort: 5432
