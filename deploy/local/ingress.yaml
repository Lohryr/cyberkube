---
# Single origin (ctf.devleo.local): frontend static files at /, backend API at
# /api and /auth. Same-origin means the cookie just works and we need no CORS.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: cyberkube
  namespace: cyberkube
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
spec:
  ingressClassName: nginx
  rules:
  - host: ctf.devleo.local
    http:
      paths:
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: cyberkube
            port:
              number: 80
      - path: /auth
        pathType: Prefix
        backend:
          service:
            name: cyberkube
            port:
              number: 80
      - path: /
        pathType: Prefix
        backend:
          service:
            name: cyberkube-frontend
            port:
              number: 80
