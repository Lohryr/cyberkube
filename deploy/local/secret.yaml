---
# LOCAL DEV ONLY. Plaintext values are acceptable here because this manifest
# is applied to an ephemeral kind cluster and is NOT the GitOps source of
# truth. In staging/prod these come from a real K8s Secret / SOPS, never git.
apiVersion: v1
kind: Secret
metadata:
  name: cyberkube-secrets
  namespace: cyberkube
type: Opaque
stringData:
  JWT_SECRET: "dev-local-insecure-jwt-secret-change-me"
  POSTGRES_PASSWORD: "cyberkube"
  # libpq-style URL consumed by the backend (pgx).
  DATABASE_URL: "postgres://cyberkube:cyberkube@cyberkube-postgres.cyberkube.svc.cluster.local:5432/cyberkube?sslmode=disable"
